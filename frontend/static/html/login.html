<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login — El Gran Poeta</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0C0F0A;--bg2:#141712;--bg3:#1C2018;
  --gold:#C9A84C;--gold3:#3D3010;
  --text:#E8E4DC;--text2:#9A9690;--text3:#5A5650;
  --green2:#4CAF6A;--red:#5C2A2A;--red2:#CF6A4C;
  --blue2:#4A8ACF;--border:#2E2B26;--border2:#3A3631;
  --r2:6px;font-family:'DM Sans',sans-serif;
}
html,body{min-height:100vh;background:radial-gradient(ellipse at 30% 40%,#1a1f10 0%,#0C0F0A 70%);
  color:var(--text);font-size:14px;display:flex;align-items:center;justify-content:center}
.role{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500}
.role-jefe{background:#2a1f0a;color:var(--gold);border:1px solid var(--gold3)}
.role-bod{background:#0a1f2a;color:var(--blue2);border:1px solid #124a5e}
.login-card{width:390px;background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:2.5rem;position:relative;overflow:hidden}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold3),var(--gold),var(--gold3))}
.login-logo{text-align:center;margin-bottom:2rem}
.login-logo .icon{font-size:44px;display:block;margin-bottom:.5rem}
.login-logo h1{font-family:'Playfair Display',serif;font-size:24px;color:var(--gold);font-weight:700}
.login-logo p{font-size:12px;color:var(--text3);margin-top:4px}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:11px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.form-group input{width:100%;background:#0C0F0A;border:1px solid var(--border2);border-radius:var(--r2);color:var(--text);font-size:13px;padding:10px 12px;font-family:'DM Sans',sans-serif;transition:border-color .2s}
.form-group input:focus{outline:none;border-color:var(--gold)}
.btn-primary{width:100%;background:var(--gold);color:#0C0F0A;border:none;border-radius:var(--r2);padding:11px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .2s;position:relative}
.btn-primary:hover{opacity:.88}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.alert{padding:10px 14px;border-radius:var(--r2);font-size:12px;margin-bottom:12px}
.alert-error{background:#2a0a0a;border:1px solid #4a1a1a;color:#cf8a7a}
.demo-users{margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border)}
.demo-users p{font-size:11px;color:var(--text3);margin-bottom:.75rem;text-align:center;text-transform:uppercase;letter-spacing:.06em}
.demo-btn{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:var(--r2);padding:9px 12px;font-size:12px;cursor:pointer;text-align:left;margin-bottom:6px;font-family:'DM Sans',sans-serif;display:flex;justify-content:space-between;align-items:center;transition:border-color .2s}
.demo-btn:hover{border-color:var(--gold)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #0C0F0A;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
<script src="../api/api.js" type="module"></script>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <span class="icon">📚</span>
    <h1>El Gran Poeta</h1>
    <p>Sistema de Inventario de Bodegas</p>
  </div>
  <div class="form-group">
    <label>Correo electrónico</label>
    <input type="email" id="inp-email" placeholder="usuario@granpoeta.cl" value="carlos@granpoeta.cl"/>
  </div>
  <div class="form-group">
    <label>Contraseña</label>
    <input type="password" id="inp-pass" placeholder="••••••••" value="jefe123"
      onkeydown="if(event.key==='Enter')doLogin()"/>
  </div>
  <div id="login-err" class="alert alert-error" style="display:none"></div>
  <button class="btn-primary" id="btn-login" onclick="doLogin()">Ingresar al sistema</button>
  <div class="demo-users">
    <p>Acceso rápido</p>
    <button class="demo-btn" onclick="quickLogin('jefe')">
      <span><b style="color:var(--text)">Carlos Rojas</b> — carlos@granpoeta.cl</span>
      <span class="role role-jefe">Jefe de Bodega</span>
    </button>
    <button class="demo-btn" onclick="quickLogin('bod')">
      <span><b style="color:var(--text)">María Torres</b> — maria@granpoeta.cl</span>
      <span class="role role-bod">Bodeguero</span>
    </button>
  </div>
</div>

<script>
const API_URL = 'http://localhost:3000/api';

async function doLogin() {
  const email    = document.getElementById('inp-email').value.trim();
  const password = document.getElementById('inp-pass').value;
  const errEl    = document.getElementById('login-err');
  const btn      = document.getElementById('btn-login');

  errEl.style.display = 'none';

  if (!email || !password) {
    errEl.textContent    = 'Ingresa tu correo y contraseña.';
    errEl.style.display  = 'block';
    return;
  }

  btn.disabled      = true;
  btn.innerHTML     = '<span class="spinner"></span>Ingresando…';

  try {
    const res  = await fetch(`${API_URL}/auth/login`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      errEl.textContent   = data.message || 'Credenciales incorrectas.';
      errEl.style.display = 'block';
      return;
    }

    // Guardar sesión
    localStorage.setItem('token',   data.token);
    localStorage.setItem('usuario', JSON.stringify(data.usuario));

    // Redirigir según perfil
    if (data.usuario.perfil === 'jefe_bodega') {
      window.location.href = 'dashboard_jefe.html';
    } else {
      window.location.href = 'dashboard_bodeguero.html';
    }

  } catch (err) {
    errEl.textContent   = 'No se puede conectar al servidor. Verifica que Docker esté corriendo.';
    errEl.style.display = 'block';
  } finally {
    btn.disabled  = false;
    btn.innerHTML = 'Ingresar al sistema';
  }
}

function quickLogin(rol) {
  if (rol === 'jefe') {
    document.getElementById('inp-email').value = 'carlos@granpoeta.cl';
    document.getElementById('inp-pass').value  = 'jefe123';
  } else {
    document.getElementById('inp-email').value = 'maria@granpoeta.cl';
    document.getElementById('inp-pass').value  = 'bod123';
  }
  doLogin();
}
</script>
</body>
</html>
