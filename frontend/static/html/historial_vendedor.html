<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Historial — El Gran Poeta</title>
<script src="../api/api.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0C0F0A;--bg2:#141712;--bg3:#1C2018;--gold:#C9A84C;--gold3:#3D3010;--text:#E8E4DC;--text2:#9A9690;--text3:#5A5650;--green2:#4CAF6A;--red:#5C2A2A;--red2:#CF6A4C;--blue2:#4A8ACF;--border:#2E2B26;--border2:#3A3631;--r:10px;--r2:6px;font-family:'DM Sans',sans-serif;}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-size:14px}
.role{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500}
.role-vend{background:#0a2a1a;color:var(--green2);border:1px solid #0a4a1a}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;height:58px}
.topbar-logo{font-family:'Playfair Display',serif;font-size:18px;color:var(--gold);font-weight:700}
.topbar-user{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text2)}
.btn-logout{background:none;border:1px solid var(--border2);color:var(--text3);font-size:11px;padding:4px 10px;border-radius:var(--r2);cursor:pointer}
.layout{display:flex;height:calc(100vh - 58px)}
.sidebar{width:215px;background:var(--bg2);border-right:1px solid var(--border);padding:1.25rem 0;flex-shrink:0}
.sidebar-section{margin-bottom:1.5rem}
.sidebar-label{font-size:10px;letter-spacing:.12em;color:var(--text3);padding:0 1.25rem;margin-bottom:6px;text-transform:uppercase}
.sidebar-item{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:none;border:none;color:var(--text2);font-size:13px;padding:8px 1.25rem;cursor:pointer;font-family:'DM Sans',sans-serif;border-left:2px solid transparent;text-decoration:none;transition:all .15s}
.sidebar-item:hover{color:var(--text);background:var(--bg3)}
.sidebar-item.active{color:var(--gold);background:var(--bg3);border-left-color:var(--gold)}
.si-icon{font-size:15px;width:18px;text-align:center}
.main{flex:1;overflow-y:auto;padding:1.75rem 2rem}
.page-header{margin-bottom:1.25rem}
.page-header h2{font-family:'Playfair Display',serif;font-size:20px;color:var(--text)}
.page-header p{font-size:12px;color:var(--text3);margin-top:3px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:var(--bg3)}
th{padding:8px 12px;text-align:left;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);font-weight:400}
td{padding:10px 12px;border-bottom:1px solid var(--bg3);color:var(--text2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg3)}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500}
.b-venta{background:#0a2a1a;color:#4caf6a;border:1px solid #1a4a1a}
.b-devolucion{background:#1a1a2a;color:#6a6acf;border:1px solid #1a1a4a}
.empty{text-align:center;padding:2rem;color:var(--text3);font-size:12px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">📚 El Gran Poeta</div>
  <div class="topbar-user">
    <span id="topbar-nombre"></span>
    <span id="topbar-rol" class="role role-vend"></span>
    <button id="btn-logout" class="btn-logout">Cerrar sesión</button>
  </div>
</div>
<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Mi bodega</div>
      <a href="dashboard_vendedor.html" class="sidebar-item"><span class="si-icon">◈</span> Panel</a>
      <a href="vender.html" class="sidebar-item"><span class="si-icon">$</span> Nueva venta</a>
      <a href="devolucion.html" class="sidebar-item"><span class="si-icon">↩</span> Devolución</a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Consultas</div>
      <a href="stock_vendedor.html" class="sidebar-item"><span class="si-icon">≡</span> Ver stock</a>
      <a href="historial_vendedor.html" class="sidebar-item active"><span class="si-icon">⇄</span> Historial</a>
    </div>
  </nav>
  <div class="main">
    <div class="page-header">
      <h2>Mi Historial</h2>
      <p>Ventas y devoluciones registradas por ti</p>
    </div>
    <div class="card">
      <table>
        <thead>
          <tr><th>#</th><th>Tipo</th><th>Productos</th><th>Total</th><th>Fecha</th></tr>
        </thead>
        <tbody id="tbody-hist">
          <tr><td colspan="5" class="empty">Cargando…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script>
async function cargarHistorial() {
  try {
    const rows = await Ventas.historial();
    const tbody = document.getElementById('tbody-hist');
    if (!rows.length) { tbody.innerHTML = '<tr><td colspan="5" class="empty">Sin transacciones registradas</td></tr>'; return; }
    tbody.innerHTML = rows.map(h => `
      <tr>
        <td style="color:var(--text3)">#${h.id}</td>
        <td><span class="badge b-${h.tipo}">${h.tipo}</span></td>
        <td style="color:var(--text2);max-width:280px">${h.productos}</td>
        <td style="color:var(--gold);font-weight:500">${h.total ? '$'+Number(h.total).toLocaleString('es-CL') : '—'}</td>
        <td style="color:var(--text3)">${new Date(h.fecha).toLocaleString('es-CL',{dateStyle:'short',timeStyle:'short'})}</td>
      </tr>`).join('');
  } catch(e) { console.error(e); }
}
document.addEventListener('DOMContentLoaded', () => {
  requiereAuth(); initTopbar();
  const u = obtenerUsuario();
  if (u && u.perfil !== 'vendedor') window.location.href = 'dashboard_jefe.html';
  cargarHistorial();
});
</script>
</body>
</html>
